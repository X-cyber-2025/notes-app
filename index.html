<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ISP Billing Panel</title><style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;}
.container{max-width:1000px;margin:10px auto;padding:10px;border-radius:12px;background:#1e293b;}
h2{text-align:center;color:#38bdf8;margin:10px 0;}

input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;background:#334155;color:#fff;}

button{border:none;border-radius:8px;padding:10px;font-weight:bold;margin-top:5px;}
.addBtn{width:100%;background:#22c55e;color:#fff;}
.switchBtn{width:100%;background:#3b82f6;color:#fff;}
.searchBtn{width:100%;background:#f59e0b;color:#fff;}

.card{background:#020617;padding:10px;margin-bottom:10px;border-radius:10px;font-size:13px;line-height:1.5;}
.card div{margin:2px 0;word-break:break-word;}

.action button{margin-right:5px;font-size:11px;padding:5px 7px;}
.edit{background:#3b82f6;}
.delete{background:#ef4444;}
.restore{background:#22c55e;}
.perma{background:#ef4444;}

.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:#020617;display:none;align-items:center;justify-content:center;text-align:center;padding:20px;}
.popup-content{color:#ef4444;font-size:18px;}
.popup button{margin-top:15px;background:#ef4444;color:#fff;padding:10px 15px;}
</style></head>
<body><div class="container">
<h2>ISP Billing Panel</h2><input id="search" placeholder="Search PPPoE / Name">
<button class="searchBtn" onclick="doSearch()">Search</button><input id="name" placeholder="Client Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<input id="ip" placeholder="PPPoE Username">
<input id="bill" placeholder="Bill Amount"><button class="addBtn" onclick="addData()">Save</button> <button class="switchBtn" onclick="toggleView()">Switch Trash</button>

<div id="list"></div>
</div><div class="popup" id="popup"><div class="popup-content" id="popupText"></div></div><script>
let dataList=JSON.parse(localStorage.getItem('ispData'))||[];
let trashList=JSON.parse(localStorage.getItem('ispTrash'))||[];
let editIndex=-1,showTrash=false;
let searchQuery="";

function getMonthKey(){let d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)}
function getMonthLabel(){return new Date().toLocaleString('en-US',{month:'long',year:'numeric'})}

function saveAll(){localStorage.setItem('ispData',JSON.stringify(dataList));localStorage.setItem('ispTrash',JSON.stringify(trashList));}

function doSearch(){
  searchQuery=document.getElementById('search').value.toLowerCase();
  renderData();
}

function renderData(){
let container=document.getElementById('list');container.innerHTML='';
let list=showTrash?trashList:dataList;

list.filter(d=>
  d.ip.includes(searchQuery)||
  d.name.toLowerCase().includes(searchQuery)||
  d.phone.includes(searchQuery)||
  d.address.toLowerCase().includes(searchQuery)
).forEach((d,i)=>{

let btn=showTrash?
`<button class='restore' onclick='restoreData(${i})'>Restore</button><button class='perma' onclick='permaDelete(${i})'>Delete</button>`:
`<button class='edit' onclick='editData(${i})'>Edit</button><button class='delete' onclick='deleteData(${i})'>Delete</button>`;

let card=`<div class='card'>
<div><b>Name:</b> ${d.name}</div>
<div><b>Phone:</b> ${d.phone}</div>
<div><b>Address:</b> ${d.address}</div>
<div><b>User:</b> ${d.ip}</div>
<div><b>Month:</b> ${d.monthLabel}</div>
<div><b>Bill:</b> ${d.bill}</div>
<div><b>Time:</b> ${d.time}</div>
<div class='action'>${btn}</div>
</div>`;

container.innerHTML+=card;
});}

function showPopup(msg){let p=document.getElementById('popup');document.getElementById('popupText').innerHTML=msg+"<br><button onclick='closePopup()'>OK</button>";p.style.display='flex';}
function closePopup(){document.getElementById('popup').style.display='none';}

function addData(){
let n=v('name'),p=v('phone'),a=v('address'),ip=v('ip').toLowerCase(),b=v('bill');
if(!n||!p||!a||!ip||!b){showPopup('Fill all fields');return}

let mk=getMonthKey(),ml=getMonthLabel();
let ex=dataList.find((d,i)=>d.ip===ip&&d.monthKey===mk&&i!==editIndex);
if(ex){showPopup(`Duplicate\n${ex.ip}\n${ex.time}`);return}

let t=new Date().toLocaleString();
let obj={name:n,phone:p,address:a,ip,bill:b,time:t,monthKey:mk,monthLabel:ml};

if(editIndex===-1)dataList.push(obj); else{dataList[editIndex]=obj;editIndex=-1}

saveAll();
searchQuery = ""; // reset search after save
renderData();
clearForm();}

function v(id){return document.getElementById(id).value.trim();}

function editData(i){let d=dataList[i];['name','phone','address','ip','bill'].forEach(k=>document.getElementById(k).value=d[k]);editIndex=i}

function deleteData(i){let x=dataList.splice(i,1)[0];x.deletedAt=new Date().toLocaleString();trashList.push(x);saveAll();renderData();}

function restoreData(i){let x=trashList.splice(i,1)[0];dataList.push(x);saveAll();renderData();}

function permaDelete(i){if(confirm('Delete forever?')){trashList.splice(i,1);saveAll();renderData();}}

function toggleView(){showTrash=!showTrash;renderData();}

function clearForm(){['name','phone','address','ip','bill'].forEach(id=>document.getElementById(id).value='');}

renderData();
</script></body>
</html>
